<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>suxeN</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0e11;
    --bg2: #13151a;
    --bg3: #1a1d24;
    --bg4: #22262f;
    --bg5: #2a2f3a;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --accent: #5b6cf9;
    --accent2: #7c8dfa;
    --accent3: #3d4fd4;
    --text: #e8eaf0;
    --text2: #8b909e;
    --text3: #555b6a;
    --green: #3dd68c;
    --red: #f05252;
    --gold: #f5c842;
    --pin: #f5a623;
    --radius: 8px;
    --radius2: 12px;
    --sidebar-w: 200px;
    --channels-w: 160px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .auth-box {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 2.5rem;
    width: 380px;
    position: relative;
    overflow: hidden;
  }
  .auth-box::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(91,108,249,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .auth-logo {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 0.25rem;
  }
  .auth-logo span { color: var(--accent2); }
  .auth-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }
  .auth-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg3);
    padding: 4px;
    border-radius: var(--radius);
    margin-bottom: 1.5rem;
  }
  .auth-tab {
    flex: 1; text-align: center;
    padding: 0.45rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text2);
    transition: all 0.2s;
  }
  .auth-tab.active {
    background: var(--accent);
    color: #fff;
  }
  .auth-form { display: flex; flex-direction: column; gap: 0.75rem; }
  .auth-form input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.7rem 1rem;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .auth-form input:focus { border-color: var(--accent); }
  .auth-btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 0.75rem;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.25rem;
  }
  .auth-btn:hover { background: var(--accent2); }
  .auth-btn:active { transform: scale(0.98); }
  .auth-error {
    font-size: 0.8rem;
    color: var(--red);
    text-align: center;
    min-height: 1.2rem;
  }

  /* ── MAIN LAYOUT ── */
  #app {
    display: none;
    height: 100vh;
    overflow: hidden;
  }
  .layout {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .layout-main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SERVER SIDEBAR ── */
  .sidebar {
    background: var(--bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    width: var(--sidebar-w);
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .server-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .server-name {
    font-size: 0.95rem;
    font-weight: 600;
  }
  .sidebar-section {
    padding: 1rem 0.75rem 0.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-section button {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    transition: color 0.2s;
    padding: 0 2px;
  }
  .sidebar-section button:hover { color: var(--text); }
  .channel-list { flex: 1; overflow-y: auto; padding: 0 0.5rem; }
  .channel-list::-webkit-scrollbar { width: 4px; }
  .channel-list::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 2px; }
  .channel-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.45rem 0.6rem;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.875rem;
    color: var(--text2);
    transition: all 0.15s;
    position: relative;
  }
  .channel-item:hover { background: var(--bg3); color: var(--text); }
  .channel-item.active { background: var(--bg4); color: var(--text); }
  .channel-item .ch-hash {
    color: var(--text3);
    font-size: 1rem;
    font-weight: 600;
  }
  .channel-item.active .ch-hash { color: var(--accent2); }
  .channel-item .ch-name { flex: 1; truncate: clip; }
  .ch-actions {
    display: none;
    gap: 2px;
  }
  .channel-item:hover .ch-actions { display: flex; }
  .ch-actions button {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 0.75rem;
    transition: all 0.15s;
  }
  .ch-actions button:hover { background: var(--bg5); color: var(--text); }

  /* ── CHANNELS PANEL ── */
  .channels-panel {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    width: var(--channels-w);
    flex-shrink: 0;
  }
  .panel-header {
    padding: 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
  }
  .online-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }
  .members-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
  .members-list::-webkit-scrollbar { width: 4px; }
  .members-list::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 2px; }
  .member-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.4rem 0.5rem;
    border-radius: var(--radius);
    font-size: 0.85rem;
    color: var(--text2);
    transition: background 0.15s;
    cursor: default;
  }
  .member-item:hover { background: var(--bg3); color: var(--text); }
  .member-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--bg5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
    flex-shrink: 0;
    position: relative;
  }
  .member-status {
    position: absolute;
    bottom: -1px; right: -1px;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--green);
    border: 2px solid var(--bg2);
  }
  .member-name { font-size: 0.85rem; }
  .admin-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    background: rgba(91,108,249,0.2);
    color: var(--accent2);
    border-radius: 4px;
    padding: 1px 5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── CHAT AREA ── */
  .chat-area {
    display: flex;
    flex-direction: column;
    background: var(--bg2);
    flex: 1;
    overflow: hidden;
  }
  .chat-header {
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-shrink: 0;
  }
  .chat-header-hash {
    font-size: 1.2rem;
    color: var(--text3);
    font-weight: 700;
  }
  .chat-header-name {
    font-size: 1rem;
    font-weight: 600;
  }
  .chat-header-desc {
    font-size: 0.8rem;
    color: var(--text2);
    margin-left: 0.5rem;
    padding-left: 0.75rem;
    border-left: 1px solid var(--border2);
  }
  .plaintext-badge {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    background: rgba(139,144,158,0.1);
    color: var(--text2);
    border: 1px solid rgba(139,144,158,0.2);
    border-radius: 20px;
    padding: 3px 10px;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── PINNED BANNER ── */
  .pinned-banner {
    background: rgba(245,166,35,0.08);
    border-bottom: 1px solid rgba(245,166,35,0.15);
    padding: 0.5rem 1.25rem;
    display: none;
    align-items: center;
    gap: 0.5rem;
    flex-shrink: 0;
  }
  .pinned-banner.show { display: flex; }
  .pin-icon { color: var(--pin); font-size: 0.9rem; }
  .pinned-banner-text {
    font-size: 0.82rem;
    color: var(--text2);
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
  }
  .pinned-banner-text strong { color: var(--pin); }

  /* ── MESSAGES ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 3px; }

  .day-divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1rem 0 0.5rem;
  }
  .day-divider::before, .day-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .day-divider span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .msg-group {
    display: flex;
    gap: 0.75rem;
    padding: 0.2rem 0.5rem;
    border-radius: var(--radius);
    position: relative;
    transition: background 0.1s;
  }
  .msg-group:hover { background: var(--bg3); }
  .msg-group.pinned-msg {
    background: rgba(245,166,35,0.05);
    border-left: 2px solid var(--pin);
    padding-left: calc(0.5rem - 2px);
  }
  .msg-group.pinned-msg:hover { background: rgba(245,166,35,0.09); }

  .msg-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--bg5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg-content { flex: 1; min-width: 0; }
  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    margin-bottom: 2px;
  }
  .msg-author {
    font-size: 0.9rem;
    font-weight: 600;
    cursor: default;
  }
  .msg-author.is-admin { color: var(--accent2); }
  .msg-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text3);
  }
  .msg-text {
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.5;
    word-break: break-word;
  }

  .msg-actions {
    position: absolute;
    right: 0.5rem;
    top: 0;
    transform: translateY(-50%);
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    display: none;
    gap: 2px;
    padding: 3px;
  }
  .msg-group:hover .msg-actions { display: flex; }
  .msg-action-btn {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    padding: 4px 7px;
    border-radius: 5px;
    font-size: 0.8rem;
    font-family: 'Syne', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .msg-action-btn:hover { background: var(--bg5); color: var(--text); }
  .msg-action-btn.pin-btn { color: var(--pin); }
  .msg-action-btn.delete-btn { color: var(--red); }

  /* ── INPUT ── */
  .chat-input-area {
    padding: 0.75rem 1.25rem;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-wrapper {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: var(--radius2);
    padding: 0.6rem 1rem;
    transition: border-color 0.2s;
  }
  .input-wrapper:focus-within { border-color: var(--accent); }
  .input-wrapper input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
  }
  .input-wrapper input::placeholder { color: var(--text3); }
  .send-btn {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    width: 30px; height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #fff;
    font-size: 1rem;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--accent2); }
  .send-btn:active { transform: scale(0.92); }

  /* ── STATUS BAR ── */
  .statusbar {
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 1rem;
    gap: 1rem;
    height: 48px;
    flex-shrink: 0;
  }
  .status-user {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .status-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
    position: relative;
  }
  .status-avatar-dot {
    position: absolute;
    bottom: -1px; right: -1px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    border: 2px solid var(--bg);
  }
  .status-name {
    font-size: 0.85rem;
    font-weight: 600;
  }
  .status-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text3);
  }
  .status-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .status-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 5px;
    font-size: 0.8rem;
    font-family: 'Syne', sans-serif;
    transition: all 0.2s;
  }
  .status-btn:hover { background: var(--bg3); color: var(--text); }
  .status-btn.danger:hover { background: rgba(240,82,82,0.15); color: var(--red); }

  /* ── MODALS ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 500;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 1.75rem;
    width: 380px;
    max-width: 90vw;
  }
  .modal h3 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .modal-form { display: flex; flex-direction: column; gap: 0.75rem; }
  .modal-form input, .modal-form select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.65rem 0.9rem;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .modal-form input:focus, .modal-form select:focus { border-color: var(--accent); }
  .modal-form select option { background: var(--bg3); }
  .modal-label {
    font-size: 0.8rem;
    color: var(--text2);
    margin-bottom: 0.3rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .modal-btns {
    display: flex;
    gap: 0.6rem;
    margin-top: 0.5rem;
  }
  .modal-btn {
    flex: 1;
    padding: 0.65rem;
    border-radius: var(--radius);
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-btn.primary { background: var(--accent); color: #fff; }
  .modal-btn.primary:hover { background: var(--accent2); }
  .modal-btn.secondary { background: var(--bg4); color: var(--text2); }
  .modal-btn.secondary:hover { background: var(--bg5); color: var(--text); }

  .chat-inner {
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .no-channel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    gap: 0.75rem;
    font-size: 0.9rem;
  }
  .no-channel-icon {
    font-size: 3rem;
    opacity: 0.3;
  }

  /* ── EMPTY STATE ── */
  .empty-messages {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    gap: 0.5rem;
  }
  .empty-messages-icon { font-size: 2.5rem; opacity: 0.3; margin-bottom: 0.5rem; }
  .empty-messages h4 { font-size: 1rem; font-weight: 600; color: var(--text2); }
  .empty-messages p { font-size: 0.85rem; }

  /* scrollbar consistent */
  .channel-list::-webkit-scrollbar-track { background: transparent; }
  .members-list::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-track { background: transparent; }

  .firebase-config-note {
    background: rgba(245, 200, 66, 0.08);
    border: 1px solid rgba(245, 200, 66, 0.2);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    font-size: 0.82rem;
    color: #f5c842;
    margin-bottom: 1rem;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.5;
  }

  .loading-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    gap: 1rem;
  }
  .loading-logo {
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: -1px;
  }
  .loading-logo span { color: var(--accent2); }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--bg4);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text3);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>



<div id="auth-screen" style="display:none">
  <div class="auth-box">
    <div class="auth-logo">NEXUS</div>
    <div class="auth-sub">standard messaging</div>
      <p>We're sorry! Due to some users, this domain is now deprecated. Please ask the creator for the new URL to access Nexus.</p>
    
  </div>
</div>


</body>
</html>
